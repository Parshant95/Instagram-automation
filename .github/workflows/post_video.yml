name: Post Instagram Video

on:
  schedule:
    - cron: '30 6 * * *'   # 12:00 PM IST (UTC+5:30)
    - cron: '30 14 * * *'  # 8:00 PM IST (UTC+5:30)
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore Instagram session
        if: ${{ env.IG_SESSION_JSON != '' }}
        shell: bash
        env:
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}
        run: printf '%s' "$IG_SESSION_JSON" > session.json

      - name: Post video
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python instagram_poster.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add session.json posted_videos.json music_state.json posts/ || true
          git diff --staged --quiet || git commit -m "chore: posted video [skip ci]"
          git push
